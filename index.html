<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☕ Brew Lab Café — WebMCP Demo</title>
  <style>
    :root {
      --primary: #6f4e37;
      --primary-h: #5a3e2b;
      --accent: #e8c99a;
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: #e8e0d5;
      --text: #2c1a0e;
      --muted: #9a8070;
      --success: #3d8b40;
      --error: #c0392b;
      --info: #2471a3;
      --radius: 14px;
      --shadow: 0 4px 18px rgba(111,78,55,0.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .5px; }
    header small { font-size: .75rem; opacity: .75; display: block; margin-top: 2px; }
    #webmcp-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.15);
      padding: 6px 14px; border-radius: 20px;
      font-size: .8rem;
    }
    #webmcp-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #aaa; transition: background .4s;
    }
    #webmcp-dot.active { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    #webmcp-dot.inactive { background: #ff9800; }
    /* ── Tabs ── */
    nav#tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 0 24px;
      gap: 4px;
    }
    nav#tabs button {
      background: none; border: none; cursor: pointer;
      padding: 14px 20px;
      font-size: .95rem; font-weight: 600; color: var(--muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: all .2s;
    }
    nav#tabs button:hover { color: var(--primary); }
    nav#tabs button.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    nav#tabs button .badge {
      background: var(--primary);
      color: #fff; border-radius: 10px;
      font-size: .7rem; padding: 1px 7px;
      margin-left: 6px;
    }
    /* ── Main ── */
    main { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    /* ── Controls Row ── */
    .controls-row {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 22px;
    }
    input[type=text], input[type=date], input[type=tel],
    input[type=number], select {
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .95rem;
      color: var(--text);
      background: var(--surface);
      transition: border-color .2s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--primary); }
    input[type=text].grow, input[type=date].grow { flex: 1; min-width: 180px; }
    select { cursor: pointer; }
    /* ── Buttons ── */
    .btn {
      padding: 10px 20px; border: none; border-radius: 10px;
      font-size: .92rem; font-weight: 600; cursor: pointer;
      transition: all .2s; white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); transform: translateY(-1px); }
    .btn-outline {
      background: transparent; color: var(--primary);
      border: 2px solid var(--primary);
    }
    .btn-outline:hover { background: var(--accent); }
    .btn-danger { background: var(--error); color: #fff; }
    .btn-danger:hover { background: #a93226; }
    .btn-sm { padding: 6px 14px; font-size: .84rem; }
    /* ── Menu Grid ── */
    #menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
    }
    .menu-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
      transition: transform .2s, box-shadow .2s;
    }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(111,78,55,0.14); }
    .menu-card .cat-tag {
      display: inline-block;
      background: var(--accent);
      color: var(--primary);
      font-size: .72rem; font-weight: 700;
      padding: 2px 10px; border-radius: 20px;
      align-self: flex-start;
    }
    .menu-card h3 { font-size: 1.05rem; }
    .menu-card p { font-size: .85rem; color: var(--muted); flex: 1; }
    .menu-card .price { font-weight: 700; color: var(--primary); font-size: 1.05rem; }
    .menu-card .row { display: flex; align-items: center; justify-content: space-between; }
    .qty-control { display: flex; align-items: center; gap: 8px; }
    .qty-control button {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-radius: 8px; background: none; cursor: pointer;
      font-size: 1.1rem; line-height: 1; color: var(--primary);
      transition: all .15s;
    }
    .qty-control button:hover { background: var(--accent); border-color: var(--primary); }
    .qty-control span { min-width: 20px; text-align: center; font-weight: 600; }
    .empty-hint {
      text-align: center; color: var(--muted);
      padding: 48px 0; font-size: 1rem;
    }
    /* ── Reservation Form ── */
    .form-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      max-width: 520px;
    }
    .form-card h2 { margin-bottom: 22px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: .88rem;
      font-weight: 600; color: var(--muted);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px;
    }
    .form-group input, .form-group select { width: 100%; }
    .form-row { display: flex; gap: 14px; }
    .form-row .form-group { flex: 1; }
    /* ── Cart ── */
    #cart-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 22px; }
    .cart-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .cart-item .name { font-weight: 600; flex: 1; }
    .cart-item .qty { color: var(--muted); font-size: .9rem; }
    .cart-item .subtotal { font-weight: 700; color: var(--primary); min-width: 68px; text-align: right; }
    #cart-total-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px;
      background: var(--accent);
      border-radius: var(--radius);
      font-weight: 700; font-size: 1.1rem;
      margin-bottom: 18px;
    }
    .cart-actions { display: flex; gap: 12px; }
    /* ── Log Console ── */
    #log-panel {
      position: fixed; bottom: 20px; right: 20px;
      width: 340px; background: #1e1e1e; color: #d4d4d4;
      border-radius: var(--radius);
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: .78rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      z-index: 9999;
      overflow: hidden;
      transition: height .3s;
    }
    #log-header {
      background: #2d2d2d; padding: 8px 14px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none;
    }
    #log-header span { font-weight: 600; font-size: .8rem; color: #e8c99a; }
    #log-body { max-height: 200px; overflow-y: auto; padding: 10px 14px; }
    .log-entry { padding: 3px 0; border-bottom: 1px solid #333; }
    .log-entry.tool { color: #9cdcfe; }
    .log-entry.success { color: #4ec9b0; }
    .log-entry.error { color: #f48771; }
    .log-entry.info { color: #dcdcaa; }
    /* ── Toast ── */
    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: var(--text); color: #fff;
      padding: 12px 22px; border-radius: 10px;
      font-size: .92rem; font-weight: 500;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 9998; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    /* ── Status Banner ── */
    #status-banner {
      background: #fff3cd; border: 1px solid #ffc107;
      border-radius: 10px; padding: 12px 18px;
      margin-bottom: 20px; font-size: .88rem; color: #856404;
      display: none;
    }
    #status-banner.show { display: block; }
    /* ── Reservation result ── */
    #reservation-result {
      margin-top: 18px; padding: 16px 20px;
      border-radius: var(--radius); display: none;
    }
    #reservation-result.ok { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; }
    #reservation-result.err { background: #fdecea; border: 1px solid #ef9a9a; color: #c62828; }
  </style>
</head>
<body>

<!-- ──────────── Header ──────────── -->
<header>
  <div>
    <h1>☕ Brew Lab Café</h1>
    <small>WebMCP Demo — Agent-Ready 網頁示範</small>
  </div>
  <div id="webmcp-badge">
    <div id="webmcp-dot"></div>
    <span id="webmcp-status">偵測 WebMCP…</span>
  </div>
</header>

<!-- ──────────── Tab Bar ──────────── -->
<nav id="tabs">
  <button class="active" onclick="switchTab('menu')">🍽️ 菜單</button>
  <button onclick="switchTab('reservation')">📅 訂位</button>
  <button onclick="switchTab('cart')">
    🛒 購物車 <span class="badge" id="cart-badge">0</span>
  </button>
</nav>

<!-- ──────────── Main ──────────── -->
<main>
  <div id="status-banner"></div>

  <!-- ── Tab: 菜單 ── -->
  <section class="tab-panel active" id="panel-menu">
    <div class="controls-row">
      <input type="text" id="search-input" class="grow" placeholder="🔍 搜尋品項名稱…" oninput="renderMenu()">
      <select id="cat-select" onchange="renderMenu()">
        <option value="">全部分類</option>
        <option value="咖啡">☕ 咖啡</option>
        <option value="茶飲">🍵 茶飲</option>
        <option value="輕食">🥐 輕食</option>
        <option value="甜點">🍰 甜點</option>
      </select>
      <button class="btn btn-outline" onclick="document.getElementById('search-input').value=''; document.getElementById('cat-select').value=''; renderMenu()">重置篩選</button>
    </div>
    <div id="menu-grid"></div>
  </section>

  <!-- ── Tab: 訂位 ── -->
  <section class="tab-panel" id="panel-reservation">
    <div class="form-card">
      <h2>📅 線上訂位</h2>
      <div class="form-row">
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="res-name" placeholder="陳小明">
        </div>
        <div class="form-group">
          <label>聯絡電話</label>
          <input type="tel" id="res-phone" placeholder="0912-345-678">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>訂位日期</label>
          <input type="date" id="res-date">
        </div>
        <div class="form-group">
          <label>用餐人數</label>
          <select id="res-party">
            <option value="">請選擇</option>
            <option value="1">1 人</option>
            <option value="2">2 人</option>
            <option value="3">3 人</option>
            <option value="4">4 人</option>
            <option value="5">5 人</option>
            <option value="6">6 人 (大桌)</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>備註</label>
        <input type="text" id="res-note" placeholder="例：靠窗座位、過敏食材…">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="submitReservation()">確認訂位</button>
      <div id="reservation-result"></div>
    </div>
  </section>

  <!-- ── Tab: 購物車 ── -->
  <section class="tab-panel" id="panel-cart">
    <div id="cart-list"></div>
    <div id="cart-total-row" style="display:none">
      <span>合計</span>
      <span id="cart-total-amount">NT$0</span>
    </div>
    <div class="cart-actions" id="cart-actions" style="display:none">
      <button class="btn btn-danger" onclick="clearCart()">🗑️ 清空購物車</button>
      <button class="btn btn-primary" onclick="checkout()">✅ 送出訂單</button>
    </div>
  </section>
</main>

<!-- ──────────── Log Console ──────────── -->
<div id="log-panel">
  <div id="log-header" onclick="toggleLog()">
    <span>🤖 WebMCP 工具呼叫紀錄</span>
    <span id="log-toggle">▾</span>
  </div>
  <div id="log-body"></div>
</div>

<!-- ──────────── Toast ──────────── -->
<div id="toast"></div>

<script>
// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════
const MENU = [
  { id:1, name:"拿鐵咖啡",   category:"咖啡", price:150, desc:"濃縮咖啡加鮮牛奶，口感滑順" },
  { id:2, name:"卡布奇諾",   category:"咖啡", price:160, desc:"細緻奶泡與雙份濃縮咖啡" },
  { id:3, name:"美式咖啡",   category:"咖啡", price:120, desc:"輕焙豆純黑咖啡，清爽回甘" },
  { id:4, name:"抹茶拿鐵",   category:"茶飲", price:155, desc:"京都抹茶粉搭配溫熱鮮奶" },
  { id:5, name:"伯爵奶茶",   category:"茶飲", price:145, desc:"伯爵茶底加台灣鮮奶" },
  { id:6, name:"可頌麵包",   category:"輕食", price: 80, desc:"法式奶油可頌，外脆內軟" },
  { id:7, name:"班尼迪克蛋", category:"輕食", price:220, desc:"水波蛋配荷蘭醬佐英式鬆餅" },
  { id:8, name:"草莓千層",   category:"甜點", price:185, desc:"每日現做，新鮮草莓奶油千層" },
  { id:9, name:"提拉米蘇",   category:"甜點", price:190, desc:"義式經典，馬斯卡彭起司製作" },
];

let cart = {}; // { itemId: quantity }
let logOpen = true;

// ════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const idx = {menu:0, reservation:1, cart:2}[name];
  document.querySelectorAll('#tabs button')[idx].classList.add('active');
}

function renderMenu() {
  const kw  = document.getElementById('search-input').value.trim().toLowerCase();
  const cat = document.getElementById('cat-select').value;
  const grid = document.getElementById('menu-grid');
  const filtered = MENU.filter(item =>
    (!cat || item.category === cat) &&
    (!kw  || item.name.toLowerCase().includes(kw) || item.desc.toLowerCase().includes(kw))
  );
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-hint">😔 沒有符合的品項</div>';
    return;
  }
  grid.innerHTML = filtered.map(item => {
    const qty = cart[item.id] || 0;
    return `
    <div class="menu-card" id="card-${item.id}">
      <span class="cat-tag">${item.category}</span>
      <h3>${item.name}</h3>
      <p>${item.desc}</p>
      <div class="row">
        <span class="price">NT$${item.price}</span>
        <div class="qty-control">
          <button onclick="changeQty(${item.id}, -1)">−</button>
          <span id="qty-${item.id}">${qty}</span>
          <button onclick="changeQty(${item.id}, +1)">+</button>
        </div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addToCartUI(${item.id}, 1)">加入購物車</button>
    </div>`;
  }).join('');
}

function changeQty(id, delta) {
  const span = document.getElementById('qty-' + id);
  let v = parseInt(span.textContent) + delta;
  if (v < 0) v = 0;
  span.textContent = v;
}

function addToCartUI(id, qty) {
  const span = document.getElementById('qty-' + id);
  const q = parseInt(span ? span.textContent : qty) || qty;
  if (q <= 0) { showToast('請先選擇數量'); return; }
  cart[id] = (cart[id] || 0) + q;
  if (span) span.textContent = 0;
  updateCartBadge();
  renderCart();
  const item = MENU.find(m => m.id === id);
  showToast(`✅ 已加入 ${item.name} ×${q}`);
}

function renderCart() {
  const list = document.getElementById('cart-list');
  const ids = Object.keys(cart).filter(k => cart[k] > 0);
  if (!ids.length) {
    list.innerHTML = '<div class="empty-hint">🛒 購物車是空的<br><small>回菜單加入品項吧</small></div>';
    document.getElementById('cart-total-row').style.display = 'none';
    document.getElementById('cart-actions').style.display = 'none';
    return;
  }
  let total = 0;
  list.innerHTML = ids.map(k => {
    const item = MENU.find(m => m.id === parseInt(k));
    const sub = item.price * cart[k];
    total += sub;
    return `<div class="cart-item">
      <span class="name">${item.name}</span>
      <span class="qty">× ${cart[k]}</span>
      <span class="subtotal">NT$${sub}</span>
      <button class="btn btn-outline btn-sm" onclick="removeCartItem(${k})">移除</button>
    </div>`;
  }).join('');
  document.getElementById('cart-total-amount').textContent = 'NT$' + total;
  document.getElementById('cart-total-row').style.display = 'flex';
  document.getElementById('cart-actions').style.display = 'flex';
}

function removeCartItem(id) {
  delete cart[id];
  updateCartBadge();
  renderCart();
}

function clearCart() {
  cart = {};
  updateCartBadge();
  renderCart();
  showToast('🗑️ 購物車已清空');
}

function checkout() {
  const ids = Object.keys(cart).filter(k => cart[k] > 0);
  if (!ids.length) return;
  showToast('🎉 訂單已送出！感謝您的光臨');
  clearCart();
}

function updateCartBadge() {
  const total = Object.values(cart).reduce((a, b) => a + b, 0);
  document.getElementById('cart-badge').textContent = total;
}

function submitReservation() {
  const name  = document.getElementById('res-name').value.trim();
  const phone = document.getElementById('res-phone').value.trim();
  const date  = document.getElementById('res-date').value;
  const party = document.getElementById('res-party').value;
  const note  = document.getElementById('res-note').value.trim();
  const el    = document.getElementById('reservation-result');

  if (!name || !phone || !date || !party) {
    el.className = 'err'; el.style.display = 'block';
    el.textContent = '❗ 請填寫完整訂位資訊（姓名、電話、日期、人數）';
    return;
  }
  el.className = 'ok'; el.style.display = 'block';
  el.innerHTML = `✅ 訂位成功！<br>
    <strong>${name}</strong> | ${phone}<br>
    📅 ${date} | 👤 ${party} 人<br>
    ${note ? '📝 備註：' + note : ''}`;
  showToast('📅 訂位已確認！');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function addLog(type, text) {
  const body = document.getElementById('log-body');
  const ts = new Date().toLocaleTimeString('zh-TW');
  const div = document.createElement('div');
  div.className = 'log-entry ' + type;
  div.textContent = `[${ts}] ${text}`;
  body.prepend(div);
}

function toggleLog() {
  logOpen = !logOpen;
  document.getElementById('log-body').style.display = logOpen ? '' : 'none';
  document.getElementById('log-toggle').textContent = logOpen ? '▾' : '▸';
}

// ════════════════════════════════════════════
//  WEBMCP TOOL REGISTRATION
// ════════════════════════════════════════════
function safeRegister(tool) {
  try { navigator.modelContext.unregisterTool(tool.name); } catch(e) {}
  navigator.modelContext.registerTool(tool);
}

function initWebMCP() {
  const dot    = document.getElementById('webmcp-dot');
  const status = document.getElementById('webmcp-status');

  if (!('modelContext' in navigator)) {
    dot.className = 'inactive';
    status.textContent = 'WebMCP 不支援（需 Chrome Canary + flag）';
    document.getElementById('status-banner').textContent =
      '⚠️ 此瀏覽器不支援 WebMCP。請使用 Chrome Canary 146+ 並開啟 chrome://flags/#enable-webmcp-testing。工具呼叫功能已停用，但頁面仍可正常操作。';
    document.getElementById('status-banner').classList.add('show');
    addLog('error', 'WebMCP 不可用，已進入 UI-only 模式');
    return;
  }

  dot.className = 'active';
  status.textContent = 'WebMCP 已啟用 ✓';
  addLog('success', 'WebMCP 初始化成功，開始註冊工具…');

  // ── Tool 1: switch_tab ──
  safeRegister({
    name: 'switch_tab',
    description: '切換頁面分頁。可選擇 menu（菜單）、reservation（訂位）或 cart（購物車）。',
    inputSchema: {
      type: 'object',
      properties: {
        tab: {
          type: 'string',
          enum: ['menu', 'reservation', 'cart'],
          description: '目標分頁名稱'
        }
      },
      required: ['tab']
    },
    annotations: { readOnlyHint: false },
    execute: async ({ tab }) => {
      addLog('tool', `switch_tab → "${tab}"`);
      const valid = ['menu', 'reservation', 'cart'];
      if (!valid.includes(tab)) {
        addLog('error', `無效 tab: ${tab}`);
        return { content: [{ type: 'text', text: `錯誤：tab 必須是 ${valid.join('/')} 之一` }] };
      }
      switchTab(tab);
      addLog('success', `已切換至 ${tab}`);
      return { content: [{ type: 'text', text: `已切換至分頁：${tab}` }] };
    }
  });

  // ── Tool 2: search_menu ──
  safeRegister({
    name: 'search_menu',
    description: '搜尋菜單品項，可依關鍵字或分類篩選，回傳符合的品項清單（含 id、名稱、分類、價格、描述）。',
    inputSchema: {
      type: 'object',
      properties: {
        keyword: {
          type: 'string',
          description: '搜尋關鍵字（品項名稱或描述）'
        },
        category: {
          type: 'string',
          enum: ['咖啡', '茶飲', '輕食', '甜點'],
          description: '分類篩選'
        }
      }
    },
    annotations: { readOnlyHint: true },
    execute: async ({ keyword = '', category = '' }) => {
      addLog('tool', `search_menu → keyword="${keyword}" category="${category}"`);
      document.getElementById('search-input').value = keyword;
      document.getElementById('cat-select').value = category;
      renderMenu();
      const kw = keyword.toLowerCase();
      const results = MENU.filter(item =>
        (!category || item.category === category) &&
        (!kw || item.name.includes(kw) || item.desc.toLowerCase().includes(kw))
      );
      addLog('success', `找到 ${results.length} 筆`);
      return { content: [{ type: 'text', text: JSON.stringify({ count: results.length, items: results }) }] };
    }
  });

  // ── Tool 3: add_to_cart ──
  safeRegister({
    name: 'add_to_cart',
    description: '將指定品項加入購物車。需提供品項 id 和數量。',
    inputSchema: {
      type: 'object',
      properties: {
        item_id: {
          type: 'number',
          description: '品項 ID（從 search_menu 取得）'
        },
        quantity: {
          type: 'number',
          description: '加入數量，預設為 1'
        }
      },
      required: ['item_id']
    },
    execute: async ({ item_id, quantity = 1 }) => {
      addLog('tool', `add_to_cart → id=${item_id} qty=${quantity}`);
      const item = MENU.find(m => m.id === item_id);
      if (!item) {
        addLog('error', `找不到品項 id=${item_id}`);
        return { content: [{ type: 'text', text: `錯誤：找不到品項 id=${item_id}` }] };
      }
      if (quantity < 1) {
        addLog('error', `數量不合法: ${quantity}`);
        return { content: [{ type: 'text', text: '錯誤：數量至少為 1' }] };
      }
      cart[item_id] = (cart[item_id] || 0) + quantity;
      updateCartBadge();
      renderCart();
      showToast(`✅ 已加入 ${item.name} ×${quantity}`);
      addLog('success', `加入成功：${item.name} ×${quantity}`);
      return { content: [{ type: 'text', text: `已加入：${item.name} ×${quantity}，小計 NT$${item.price * quantity}` }] };
    }
  });

  // ── Tool 4: view_cart ──
  safeRegister({
    name: 'view_cart',
    description: '查看目前購物車內容，回傳品項清單和總金額。',
    inputSchema: { type: 'object', properties: {} },
    annotations: { readOnlyHint: true },
    execute: async () => {
      addLog('tool', 'view_cart');
      const ids = Object.keys(cart).filter(k => cart[k] > 0);
      if (!ids.length) {
        return { content: [{ type: 'text', text: '購物車是空的' }] };
      }
      let total = 0;
      const items = ids.map(k => {
        const item = MENU.find(m => m.id === parseInt(k));
        const sub = item.price * cart[k];
        total += sub;
        return { id: item.id, name: item.name, quantity: cart[k], unit_price: item.price, subtotal: sub };
      });
      addLog('success', `購物車 ${items.length} 項，合計 NT$${total}`);
      return { content: [{ type: 'text', text: JSON.stringify({ items, total }) }] };
    }
  });

  // ── Tool 5: clear_cart ──
  safeRegister({
    name: 'clear_cart',
    description: '清空購物車所有品項。',
    inputSchema: { type: 'object', properties: {} },
    execute: async () => {
      addLog('tool', 'clear_cart');
      clearCart();
      addLog('success', '購物車已清空');
      return { content: [{ type: 'text', text: '購物車已清空' }] };
    }
  });

  // ── Tool 6: make_reservation ──
  safeRegister({
    name: 'make_reservation',
    description: '線上訂位。需填寫姓名、電話、日期、人數，備註可選填。',
    inputSchema: {
      type: 'object',
      properties: {
        name:       { type: 'string', description: '訂位人姓名' },
        phone:      { type: 'string', description: '聯絡電話' },
        date:       { type: 'string', description: '訂位日期，格式 YYYY-MM-DD' },
        party_size: { type: 'number', description: '用餐人數（1～6）' },
        note:       { type: 'string', description: '備註（可選）' }
      },
      required: ['name', 'phone', 'date', 'party_size']
    },
    execute: async ({ name, phone, date, party_size, note = '' }) => {
      addLog('tool', `make_reservation → ${name} / ${phone} / ${date} / ${party_size}人`);
      if (party_size < 1 || party_size > 6) {
        addLog('error', `人數不合法: ${party_size}`);
        return { content: [{ type: 'text', text: '錯誤：人數限 1～6 人' }] };
      }
      // 填入表單並切換分頁
      switchTab('reservation');
      document.getElementById('res-name').value  = name;
      document.getElementById('res-phone').value = phone;
      document.getElementById('res-date').value  = date;
      document.getElementById('res-party').value = String(party_size);
      document.getElementById('res-note').value  = note;
      submitReservation();
      addLog('success', `訂位完成：${name} ${date} ${party_size}人`);
      return { content: [{ type: 'text', text: `訂位成功：${name} | ${phone} | ${date} | ${party_size}人${note ? ' | 備註：'+note : ''}` }] };
    }
  });

  addLog('info', '✅ 已註冊 6 個 WebMCP 工具：switch_tab / search_menu / add_to_cart / view_cart / clear_cart / make_reservation');
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
renderMenu();
renderCart();
initWebMCP();
</script>
</body>
</html>
